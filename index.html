<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#000;
  --bg2:#121212;
  --bg3:#1a1a1a;
  --bg4:#262626;
  --border:#262626;
  --border2:#363636;
  --text:#f5f5f5;
  --text2:#a8a8a8;
  --text3:#737373;
  --accent:#0095f6;
  --card:#1c1c1c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--text);-webkit-text-size-adjust:100%}
button{cursor:pointer;background:none;border:none;font-family:inherit;color:inherit;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit;outline:none}
a{text-decoration:none;color:inherit}
img{display:block}
code{font-family:monospace;background:var(--bg4);color:#e0e0e0;padding:1px 5px;border-radius:3px;font-size:12px}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes heartPop{0%,100%{transform:scale(1)}30%{transform:scale(1.35)}60%{transform:scale(1.1)}}
@keyframes shimmer{0%{background-position:-468px 0}100%{background-position:468px 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

.skeleton{
  background:linear-gradient(90deg,#1c1c1c 25%,#2a2a2a 50%,#1c1c1c 75%);
  background-size:400% 100%;
  animation:shimmer 1.4s ease infinite;
}

/* ── Nav ───────────────────────────────────────── */
.nav{
  position:sticky;top:0;z-index:100;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  height:54px;display:flex;align-items:center;
}
.nav-inner{
  max-width:935px;margin:0 auto;width:100%;
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{
  font-family:'Dancing Script','Georgia',cursive;
  font-size:28px;font-weight:700;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#405de6,#5851db,#833ab4,#c13584,#e1306c,#fd1d1d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.nav-actions{display:flex;align-items:center;gap:14px}
.nav-btn{
  display:flex;align-items:center;gap:5px;
  font-size:13px;font-weight:600;color:var(--text);
  padding:6px 10px;border-radius:8px;
  transition:background .15s;
}
.nav-btn:hover{background:var(--bg4)}

/* ── Profile ────────────────────────────────────── */
.profile-wrap{background:var(--bg);border-bottom:1px solid var(--border)}
.profile-inner{
  max-width:935px;margin:0 auto;
  padding:28px 20px 20px;
  display:flex;gap:36px;align-items:flex-start;
}
.profile-avatar{
  width:92px;height:92px;border-radius:50%;
  overflow:hidden;flex-shrink:0;
  border:1px solid var(--border2);
  background:var(--bg4);
  display:flex;align-items:center;justify-content:center;
}
.profile-avatar-ring{
  width:96px;height:96px;border-radius:50%;
  background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  padding:2px;flex-shrink:0;
}
.profile-avatar-ring-inner{
  width:100%;height:100%;border-radius:50%;
  overflow:hidden;border:2px solid var(--bg);background:var(--bg4);
}
.profile-info{flex:1;min-width:0}
.profile-row1{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.profile-username{font-size:20px;font-weight:300;color:var(--text)}
.profile-stats{display:flex;gap:28px;margin-bottom:10px;flex-wrap:wrap}
.profile-stat{font-size:15px;color:var(--text)}
.profile-stat strong{font-weight:600}
.profile-name{font-weight:600;font-size:14px;margin-bottom:3px;color:var(--text)}
.profile-bio{font-size:14px;line-height:1.5;white-space:pre-wrap;color:var(--text)}
.profile-link{font-size:14px;color:#5ba3d9;font-weight:500}
.tg-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;color:#5ba3d9;font-weight:500;
  background:rgba(0,136,204,0.15);padding:3px 8px;border-radius:20px;
}

/* ── Buttons ────────────────────────────────────── */
.btn-primary{
  padding:7px 16px;
  background:#0095f6;color:white;
  border-radius:8px;font-size:14px;font-weight:600;
  transition:background .2s,transform .1s;
}
.btn-primary:hover{background:#1aa3ff}
.btn-primary:active{transform:scale(0.98)}
.btn-primary:disabled{background:#0060a0;cursor:not-allowed;transform:none;color:#9ec8ea}
.btn-outline{
  padding:6px 14px;background:transparent;color:var(--text);
  border:1px solid var(--border2);border-radius:8px;
  font-size:13px;font-weight:600;
  transition:background .15s;
}
.btn-outline:hover{background:var(--bg4)}

/* ── Stories ─────────────────────────────────────── */
.stories-section{background:var(--bg);border-bottom:1px solid var(--border)}
.stories-bar{
  max-width:935px;margin:0 auto;
  display:flex;gap:16px;overflow-x:auto;
  padding:14px 20px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.stories-bar::-webkit-scrollbar{display:none}
.story{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex-shrink:0;background:none;border:none;padding:0;cursor:pointer;
}
.story-ring{
  width:66px;height:66px;border-radius:50%;
  background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  padding:2px;
}
.story-ring-inner{
  width:100%;height:100%;border-radius:50%;
  overflow:hidden;border:2.5px solid var(--bg);
  background:var(--bg4);
}
.story-ring-inner img{width:100%;height:100%;object-fit:cover}
.story-label{font-size:11px;color:var(--text2);max-width:66px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}

/* ── Tabs ────────────────────────────────────────── */
.tabs-bar{background:var(--bg);border-bottom:1px solid var(--border);display:flex;justify-content:center;gap:40px}
.tab-btn{
  padding:12px 2px;font-size:12px;font-weight:600;
  letter-spacing:1px;color:var(--text3);text-transform:uppercase;
  border-top:1px solid transparent;margin-top:-1px;
  display:flex;align-items:center;gap:5px;
  transition:color .15s;
}
.tab-btn.active{color:var(--text);border-top-color:var(--text)}

/* ── Photo Grid ─────────────────────────────────── */
.grid-wrap{max-width:935px;margin:0 auto;padding-bottom:80px}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.photo-cell{
  position:relative;aspect-ratio:1/1;overflow:hidden;
  cursor:pointer;background:var(--bg3);
}
.photo-cell img{width:100%;height:100%;object-fit:cover;transition:transform .25s ease}
.photo-cell:hover img{transform:scale(1.05)}
.photo-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0);
  display:flex;align-items:center;justify-content:center;gap:24px;
  transition:background .2s;pointer-events:none;
}
.photo-cell:hover .photo-overlay{background:rgba(0,0,0,0.45)}
.overlay-stat{
  color:white;font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:4px;
  opacity:0;transition:opacity .2s;
}
.photo-cell:hover .overlay-stat{opacity:1}

/* ── Empty State ────────────────────────────────── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 20px;gap:16px;
}
.empty-icon{
  width:88px;height:88px;border-radius:50%;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);
}

/* ── Modal ───────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.96);
  display:flex;align-items:center;justify-content:center;
  animation:fadeIn .15s ease;
  overflow:hidden;
}
.modal-box{
  background:var(--card);
  display:flex;flex-direction:row;
  width:min(940px,96vw);height:min(680px,90vh);
  border-radius:6px;overflow:hidden;
  animation:slideUp .2s ease;
  border:1px solid var(--border);
}
.modal-img-panel{
  flex:1;background:#000;
  display:flex;align-items:center;justify-content:center;
  min-width:0;overflow:hidden;
}
.modal-img-panel img{width:100%;height:100%;object-fit:contain}
.modal-sidebar{
  width:320px;flex-shrink:0;
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);
  background:var(--card);
  overflow:hidden;
}
.modal-header{
  padding:12px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.modal-micro-avatar{
  width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0;
}
.modal-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;-webkit-overflow-scrolling:touch}
.modal-actions{border-top:1px solid var(--border);padding:8px 14px;flex-shrink:0}
.modal-action-row{display:flex;gap:14px;align-items:center;margin-bottom:6px}
.action-btn{color:var(--text);display:flex;align-items:center;transition:transform .1s;padding:4px}
.action-btn:hover{transform:scale(1.1)}
.comment-bar{
  border-top:1px solid var(--border);flex-shrink:0;
  display:flex;align-items:center;
  padding:9px 14px;gap:8px;
}
.comment-input{flex:1;font-size:14px;border:none;background:none;color:var(--text);min-width:0}
.comment-input::placeholder{color:var(--text3)}
.comment-post{color:#0095f6;font-weight:600;font-size:14px;transition:opacity .15s;white-space:nowrap}
.comment-post:disabled{opacity:0.35;cursor:default}
.modal-nav{
  position:fixed;
  width:40px;height:40px;border-radius:50%;
  background:rgba(30,30,30,0.85);
  border:1px solid rgba(255,255,255,0.15);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:white;z-index:1001;
  transition:background .2s;
}
.modal-nav:hover{background:rgba(60,60,60,0.9)}
.modal-close{
  position:fixed;top:12px;right:12px;
  color:white;z-index:1001;
  background:rgba(30,30,30,0.7);
  border:none;cursor:pointer;border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
.modal-close:hover{background:rgba(60,60,60,0.9)}

/* ── Setup ───────────────────────────────────────── */
.setup-wrap{
  max-width:480px;margin:0 auto;
  padding:40px 16px 60px;
  animation:fadeIn .3s;
  overflow-x:hidden;
}
.setup-step-card{
  background:var(--card);border:1px solid var(--border2);
  border-radius:12px;padding:18px;margin-bottom:16px;
}
.setup-step-row{display:flex;gap:12px;margin-bottom:12px}
.setup-step-row:last-child{margin-bottom:0}
.setup-step-num{
  width:26px;height:26px;border-radius:50%;
  background:#0095f6;color:white;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;flex-shrink:0;margin-top:1px;
}
.field-label{display:block;font-size:13px;font-weight:600;margin-bottom:5px;color:var(--text)}
.field-input{
  display:block;width:100%;
  padding:10px 12px;
  border:1px solid var(--border2);border-radius:8px;
  font-size:16px;background:var(--bg3);color:var(--text);
  transition:border-color .2s,background .2s;
  -webkit-appearance:none;
}
.field-input:focus{border-color:#555;background:var(--bg4)}
.field-input::placeholder{color:var(--text3)}
textarea.field-input{resize:vertical;font-size:14px}
.sync-msg-ok{color:#2ecc71;font-size:12px;margin-top:4px}
.sync-msg-err{color:#ed4956;font-size:12px;margin-top:4px}

/* ── Comment items ─────────────────────────────── */
.comment-item{display:flex;gap:10px;margin-bottom:14px}
.comment-ghost-avatar{
  width:32px;height:32px;border-radius:50%;
  background:var(--bg4);display:flex;align-items:center;
  justify-content:center;font-size:15px;flex-shrink:0;
}

/* ── Mobile: bottom-sheet modal + compact profile ── */
@media(max-width:680px){
  /* Profile: compact two-row layout */
  .profile-inner{gap:14px;padding:16px 14px 14px;align-items:center}
  .profile-avatar-ring{width:78px;height:78px}
  .profile-avatar{width:78px;height:78px}
  .profile-row1{gap:8px;margin-bottom:10px;flex-wrap:nowrap}
  .profile-username{font-size:16px}
  .btn-outline{padding:5px 10px;font-size:12px}
  .profile-stats{gap:16px;margin-bottom:8px}
  .profile-stat{font-size:13px}
  .tg-badge{font-size:11px;padding:2px 6px}

  /* Nav: hide sync text, icon only */
  .nav-sync-text{display:none}
  .nav{height:48px}

  /* Modal: full-screen bottom-sheet  */
  .modal-overlay{align-items:flex-end}
  .modal-box{
    flex-direction:column;
    width:100vw;height:100dvh;
    border-radius:0;border:none;
    max-height:100dvh;
  }
  .modal-img-panel{
    flex:0 0 auto;
    height:52vw;
    min-height:200px;
    max-height:55vw;
  }
  .modal-sidebar{
    width:100%;border-left:none;
    border-top:1px solid var(--border);
    flex:1;min-height:0;
  }
  .modal-nav{display:none}
  .modal-close{top:8px;right:8px;width:32px;height:32px}

  /* Grid */
  .photo-grid{gap:2px;padding:0}
  .grid-wrap{padding-bottom:60px}
}

@media(max-width:400px){
  .profile-avatar-ring{width:68px;height:68px}
  .profile-avatar{width:68px;height:68px}
  .profile-inner{padding:12px 12px 12px}
  .btn-outline{display:none}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Telegram API ──────────────────────────────────────────── */
async function tgCall(token, method, params = {}) {
  const url = new URL(`https://api.telegram.org/bot${token}/${method}`);
  for (const [k, v] of Object.entries(params))
    url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : String(v));
  const r = await fetch(url.toString());
  const d = await r.json();
  if (!d.ok) throw new Error(d.description || "Telegram API error");
  return d.result;
}

/* ─── Local Storage ─────────────────────────────────────────── */
const S = {
  get: k => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

/* ─── Icons ─────────────────────────────────────────────────── */
const Ico = {
  Heart: ({ f, s = 22 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24"
      fill={f ? "#ed4956" : "none"} stroke={f ? "#ed4956" : "currentColor"}
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  ),
  Comment: ({ s = 22 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  ),
  Share: ({ s = 22 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  ),
  Bookmark: ({ s = 22 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
    </svg>
  ),
  Gear: ({ s = 20 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  ),
  Grid: ({ s = 14 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
  ),
  Close: ({ s = 26 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  ),
  ChevL: ({ s = 26 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
  ),
  ChevR: ({ s = 26 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  ),
  Sync: ({ s = 16, spin }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor"
      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      style={spin ? {animation:"spin .8s linear infinite",display:"block"} : {display:"block"}}>
      <polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/>
      <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
    </svg>
  ),
  Tg: ({ s = 16 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="#0088cc">
      <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.835l-2.965-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.651.75z"/>
    </svg>
  ),
  Camera: ({ s = 38 }) => (
    <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  ),
};

/* ─── App ────────────────────────────────────────────────────── */
function App() {
  const [cfg, setCfg]           = useState(null);
  const [photos, setPhotos]     = useState([]);
  const [likes, setLikes]       = useState({});
  const [comments, setComments] = useState({});
  const [sel, setSel]           = useState(null);
  const [setup, setSetup]       = useState(false);
  const [syncing, setSyncing]   = useState(false);
  const [syncMsg, setSyncMsg]   = useState("");
  const [ready, setReady]       = useState(false);

  useEffect(() => {
    setCfg(S.get("tgp_cfg"));
    setPhotos(S.get("tgp_photos") || []);
    setLikes(S.get("tgp_likes") || {});
    setComments(S.get("tgp_comments") || {});
    setReady(true);
  }, []);

  const sync = useCallback(async () => {
    if (!cfg?.token) return;
    setSyncing(true);
    setSyncMsg("Connecting to Telegram…");
    try {
      const lastId = S.get("tgp_lastId") || 0;
      setSyncMsg("Fetching channel posts…");
      const updates = await tgCall(cfg.token, "getUpdates", {
        offset: lastId + 1, limit: 100,
        allowed_updates: ["channel_post", "message"],
      });
      let maxId = lastId;
      const fresh = [];
      for (const u of updates) {
        maxId = Math.max(maxId, u.update_id);
        const msg = u.channel_post || u.message;
        if (!msg?.photo) continue;
        const ph = msg.photo[msg.photo.length - 1];
        setSyncMsg(`Processing photo ${fresh.length + 1}…`);
        try {
          const file = await tgCall(cfg.token, "getFile", { file_id: ph.file_id });
          fresh.push({
            id: ph.file_unique_id,
            file_id: ph.file_id,
            url: `https://api.telegram.org/file/bot${cfg.token}/${file.file_path}`,
            caption: msg.caption || "",
            date: msg.date,
            width: ph.width,
            height: ph.height,
          });
        } catch {}
      }
      if (updates.length > 0) S.set("tgp_lastId", maxId);
      if (fresh.length > 0) {
        const all = [...fresh, ...photos].sort((a,b) => b.date - a.date);
        S.set("tgp_photos", all);
        setPhotos(all);
        setSyncMsg(`✓ ${fresh.length} new photo${fresh.length > 1 ? "s" : ""} added!`);
      } else {
        setSyncMsg(updates.length === 0 ? "✓ Already up to date" : "✓ No new photos found");
      }
    } catch (e) { setSyncMsg(`✗ ${e.message}`); }
    setSyncing(false);
    setTimeout(() => setSyncMsg(""), 4500);
  }, [cfg, photos]);

  const toggleLike = id => {
    const next = { ...likes, [id]: !likes[id] };
    setLikes(next); S.set("tgp_likes", next);
  };
  const addComment = (pid, text) => {
    if (!text.trim()) return;
    const next = { ...comments, [pid]: [...(comments[pid] || []), { text: text.trim(), ts: Date.now() }] };
    setComments(next); S.set("tgp_comments", next);
  };
  const saveConfig = c => { setCfg(c); S.set("tgp_cfg", c); setSetup(false); };

  const msgColor = syncMsg.startsWith("✓") ? "#2ecc71" : syncMsg.startsWith("✗") ? "#ed4956" : "var(--text2)";

  if (!ready) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#000"}}>
      <div style={{textAlign:"center",color:"#737373"}}><Ico.Camera s={42}/><p style={{marginTop:12,fontSize:14}}>Loading…</p></div>
    </div>
  );

  if (!cfg || setup) return <SetupScreen existing={cfg} onSave={saveConfig} onCancel={cfg ? ()=>setSetup(false) : null}/>;

  const totalLikes = Object.values(likes).filter(Boolean).length;

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>

      {/* Nav */}
      <nav className="nav">
        <div className="nav-inner">
          <span className="nav-logo">Folio</span>
          <div className="nav-actions">
            <button className="nav-btn" onClick={sync} disabled={syncing}>
              <Ico.Sync s={15} spin={syncing}/>
              <span className="nav-sync-text" style={{color:msgColor}}>{syncMsg || "Sync"}</span>
            </button>
            <button className="nav-btn" onClick={()=>setSetup(true)} title="Settings">
              <Ico.Gear s={20}/>
            </button>
          </div>
        </div>
      </nav>

      {/* Profile */}
      <div className="profile-wrap">
        <div className="profile-inner">
          {photos.length > 0 ? (
            <div className="profile-avatar-ring">
              <div className="profile-avatar-ring-inner">
                <img src={photos[0].url} alt="avatar" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
              </div>
            </div>
          ) : (
            <div className="profile-avatar">
              <Ico.Camera s={36}/>
            </div>
          )}
          <div className="profile-info">
            <div className="profile-row1">
              <span className="profile-username">{cfg.username || "photographer"}</span>
              <button className="btn-outline" onClick={()=>setSetup(true)}>Edit</button>
              <button className="btn-outline" onClick={sync} disabled={syncing}
                style={{display:"flex",alignItems:"center",gap:5}}>
                <Ico.Sync s={12} spin={syncing}/> {syncing ? "Syncing…" : "Sync"}
              </button>
            </div>
            <div className="profile-stats">
              <span className="profile-stat"><strong>{photos.length}</strong> posts</span>
              <span className="profile-stat"><strong>{totalLikes}</strong> likes</span>
              <span className="tg-badge"><Ico.Tg s={14}/> Telegram storage</span>
            </div>
            {cfg.name && <p className="profile-name">{cfg.name}</p>}
            {cfg.bio && <p className="profile-bio">{cfg.bio}</p>}
            {cfg.website && <a className="profile-link" href={cfg.website} target="_blank" rel="noreferrer">{cfg.website}</a>}
          </div>
        </div>
      </div>

      {/* Stories */}
      {photos.length > 0 && (
        <div className="stories-section">
          <div className="stories-bar">
            {photos.slice(0,20).map((p,i) => (
              <button key={p.id} className="story" onClick={()=>setSel(p)}>
                <div className="story-ring">
                  <div className="story-ring-inner">
                    <img src={p.url} alt="" loading="lazy"/>
                  </div>
                </div>
                <span className="story-label">
                  {p.caption?.split("\n")[0]?.substring(0,10) || `Photo ${i+1}`}
                </span>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Tabs */}
      <div className="tabs-bar">
        <button className="tab-btn active"><Ico.Grid s={13}/> Posts</button>
      </div>

      {/* Grid */}
      <div className="grid-wrap">
        {photos.length === 0 ? (
          <EmptyState onSync={sync} syncing={syncing}/>
        ) : (
          <div className="photo-grid">
            {photos.map(p => (
              <div key={p.id} className="photo-cell" onClick={()=>setSel(p)}>
                <img src={p.url} alt={p.caption} loading="lazy"
                  onError={e=>{e.target.style.display="none"}}/>
                <div className="photo-overlay">
                  <span className="overlay-stat">
                    <Ico.Heart f={true} s={16}/> {likes[p.id] ? 1 : 0}
                  </span>
                  <span className="overlay-stat">
                    <Ico.Comment s={16}/> {(comments[p.id]||[]).length}
                  </span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Modal */}
      {sel && (
        <PhotoModal
          photo={sel} photos={photos}
          liked={!!likes[sel.id]}
          photoComments={comments[sel.id]||[]}
          onLike={()=>toggleLike(sel.id)}
          onClose={()=>setSel(null)}
          onNav={setSel}
          onComment={text=>addComment(sel.id,text)}
          cfg={cfg}
        />
      )}
    </div>
  );
}

/* ─── Empty State ────────────────────────────────────────────── */
function EmptyState({ onSync, syncing }) {
  return (
    <div className="empty-state">
      <div className="empty-icon"><Ico.Camera s={38}/></div>
      <h3 style={{fontSize:22,fontWeight:300}}>No Photos Yet</h3>
      <p style={{color:"#a8a8a8",textAlign:"center",maxWidth:280,fontSize:14,lineHeight:1.65}}>
        Post photos to your Telegram channel, then sync to display them here.
      </p>
      <button className="btn-primary" onClick={onSync} disabled={syncing}
        style={{display:"flex",alignItems:"center",gap:7,padding:"9px 20px"}}>
        <Ico.Sync s={15} spin={syncing}/> {syncing ? "Syncing…" : "Sync from Telegram"}
      </button>
    </div>
  );
}

/* ─── Photo Modal ────────────────────────────────────────────── */
function PhotoModal({ photo, photos, liked, photoComments, onLike, onClose, onNav, onComment, cfg }) {
  const [text, setText]       = useState("");
  const [heartAnim, setHA]    = useState(false);
  const idx = photos.findIndex(p => p.id === photo.id);
  const dateStr = new Date(photo.date * 1000).toLocaleDateString("en-US", {month:"long",day:"numeric"});

  useEffect(() => {
    const fn = e => {
      if (e.key === "Escape") onClose();
      if (e.key === "ArrowLeft"  && idx > 0)              onNav(photos[idx-1]);
      if (e.key === "ArrowRight" && idx < photos.length-1) onNav(photos[idx+1]);
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [idx, photos, onClose, onNav]);

  const handleLike = () => {
    if (!liked) { setHA(true); setTimeout(()=>setHA(false), 600); }
    onLike();
  };
  const handlePost = () => { onComment(text); setText(""); };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <button className="modal-close" onClick={onClose}><Ico.Close s={26}/></button>
      {idx > 0 && (
        <button className="modal-nav" style={{left:12,top:"50%",transform:"translateY(-50%)"}} onClick={()=>onNav(photos[idx-1])}>
          <Ico.ChevL s={22}/>
        </button>
      )}
      {idx < photos.length-1 && (
        <button className="modal-nav" style={{right:12,top:"50%",transform:"translateY(-50%)"}} onClick={()=>onNav(photos[idx+1])}>
          <Ico.ChevR s={22}/>
        </button>
      )}

      <div className="modal-box">
        <div className="modal-img-panel">
          <img src={photo.url} alt={photo.caption}/>
        </div>
        <div className="modal-sidebar">
          {/* Header */}
          <div className="modal-header">
            <div className="modal-micro-avatar">
              <img src={photo.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>
            <span style={{fontWeight:600,fontSize:14}}>{cfg.username||"photographer"}</span>
          </div>

          {/* Caption + Comments */}
          <div className="modal-scroll">
            {photo.caption && (
              <div className="comment-item">
                <div className="modal-micro-avatar" style={{flexShrink:0}}>
                  <img src={photo.url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                </div>
                <div>
                  <span style={{fontWeight:600,fontSize:14,marginRight:5}}>{cfg.username||"photographer"}</span>
                  <span style={{fontSize:14}}>{photo.caption}</span>
                  <p style={{color:"#737373",fontSize:11,marginTop:4}}>{dateStr}</p>
                </div>
              </div>
            )}
            {photoComments.map((c,i) => (
              <div key={i} className="comment-item">
                <div className="comment-ghost-avatar">👤</div>
                <div>
                  <span style={{fontWeight:600,fontSize:14,marginRight:5}}>visitor</span>
                  <span style={{fontSize:14}}>{c.text}</span>
                  <p style={{color:"#737373",fontSize:11,marginTop:4}}>
                    {new Date(c.ts).toLocaleDateString()}
                  </p>
                </div>
              </div>
            ))}
          </div>

          {/* Actions */}
          <div className="modal-actions">
            <div className="modal-action-row">
              <button className="action-btn" onClick={handleLike}
                style={{
                  color:liked?"#ed4956":"#f5f5f5",
                  animation:heartAnim?"heartPop .5s ease":""
                }}>
                <Ico.Heart f={liked} s={24}/>
              </button>
              <button className="action-btn"><Ico.Comment s={24}/></button>
              <button className="action-btn"><Ico.Share s={24}/></button>
              <button className="action-btn" style={{marginLeft:"auto"}}><Ico.Bookmark s={24}/></button>
            </div>
            <p style={{fontWeight:600,fontSize:13,marginBottom:3}}>
              {liked ? "1 like" : "Be the first to like this"}
            </p>
            <p style={{color:"#737373",fontSize:10,letterSpacing:.5,textTransform:"uppercase"}}>{dateStr}</p>
          </div>

          {/* Comment input */}
          <div className="comment-bar">
            <input
              className="comment-input"
              value={text}
              onChange={e=>setText(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&handlePost()}
              placeholder="Add a comment…"
            />
            <button className="comment-post" onClick={handlePost} disabled={!text.trim()}>Post</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── Setup Screen ───────────────────────────────────────────── */
function SetupScreen({ existing, onSave, onCancel }) {
  const [step, setStep] = useState(existing ? 1 : 0);
  const [form, setForm] = useState({
    token:    existing?.token    || "",
    chatId:   existing?.chatId   || "",
    username: existing?.username || "",
    name:     existing?.name     || "",
    bio:      existing?.bio      || "",
    website:  existing?.website  || "",
  });
  const [testing, setTesting] = useState(false);
  const [testMsg, setTestMsg] = useState("");

  const upd = k => e => setForm(f => ({...f, [k]: e.target.value}));

  const testConn = async () => {
    if (!form.token) return;
    setTesting(true); setTestMsg("");
    try {
      const bot = await tgCall(form.token, "getMe");
      setTestMsg(`✓ Connected! Bot: @${bot.username}`);
    } catch (e) { setTestMsg(`✗ ${e.message}`); }
    setTesting(false);
  };

  if (step === 0) return (
    <div className="setup-wrap">
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12,marginBottom:14}}>
          <span style={{fontSize:48}}>📷</span>
          <span style={{fontSize:28,color:"#c7c7c7"}}>×</span>
          <svg width={48} height={48} viewBox="0 0 24 24" fill="#0088cc">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.835l-2.965-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.651.75z"/>
          </svg>
        </div>
        <h1 style={{fontSize:28,fontWeight:700,marginBottom:8}}>Telegram Portfolio</h1>
        <p style={{color:"#a8a8a8",fontSize:15,lineHeight:1.65,maxWidth:380,margin:"0 auto"}}>
          An Instagram-style photo portfolio — with Telegram's free cloud as your database.
        </p>
      </div>

      <div className="setup-step-card">
        <h3 style={{fontWeight:700,fontSize:15,marginBottom:16}}>Setup in 4 steps</h3>
        {[
          {n:"1",t:"Create a Bot",d:<>Message <strong>@BotFather</strong> → send <code>/newbot</code> → copy the <strong>Bot Token</strong></>},
          {n:"2",t:"Create a Channel or Group",d:<>Create a Telegram channel or group → add your bot as <strong>Admin</strong></>},
          {n:"3",t:"Get the Chat ID",d:<>Public channel → use <code>@channelname</code>. Private → forward any message to <strong>@userinfobot</strong></>},
          {n:"4",t:"Post Photos There",d:"Send photos to the channel. They'll appear here after you sync."},
        ].map(({n,t,d})=>(
          <div key={n} className="setup-step-row">
            <div className="setup-step-num">{n}</div>
            <div>
              <p style={{fontWeight:600,fontSize:14}}>{t}</p>
              <p style={{fontSize:13,color:"#a8a8a8",marginTop:2,lineHeight:1.5}}>{d}</p>
            </div>
          </div>
        ))}
      </div>

      <button className="btn-primary" style={{width:"100%",padding:12,fontSize:15}} onClick={()=>setStep(1)}>
        Get Started →
      </button>
    </div>
  );

  return (
    <div className="setup-wrap">
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:28}}>
        {onCancel
          ? <button onClick={onCancel} style={{fontSize:14,color:"#0095f6",fontWeight:600}}>← Back</button>
          : <button onClick={()=>setStep(0)} style={{fontSize:14,color:"#0095f6",fontWeight:600}}>← Guide</button>
        }
        <h2 style={{fontSize:22,fontWeight:700}}>Configure Portfolio</h2>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Token */}
        <div>
          <label className="field-label">Bot Token *</label>
          <div style={{display:"flex",gap:8}}>
            <input className="field-input" style={{flex:1}} value={form.token} onChange={upd("token")} placeholder="1234567890:ABCDef…"/>
            <button className="btn-primary" style={{flexShrink:0,padding:"9px 14px"}} onClick={testConn} disabled={testing||!form.token}>
              {testing?"…":"Test"}
            </button>
          </div>
          {testMsg && <p className={testMsg.startsWith("✓")?"sync-msg-ok":"sync-msg-err"}>{testMsg}</p>}
          <p style={{fontSize:11,color:"#a8a8a8",marginTop:4}}>Get from @BotFather on Telegram</p>
        </div>

        {/* Chat ID */}
        <div>
          <label className="field-label">Chat / Channel ID *</label>
          <input className="field-input" value={form.chatId} onChange={upd("chatId")} placeholder="@mychannel or -1001234567890"/>
          <p style={{fontSize:11,color:"#a8a8a8",marginTop:4}}>The channel or group where your photos live</p>
        </div>

        {/* Profile */}
        <div style={{borderTop:"1px solid #2a2a2a",paddingTop:16,marginTop:4}}>
          <p style={{fontSize:11,fontWeight:700,color:"#737373",textTransform:"uppercase",letterSpacing:.8,marginBottom:14}}>
            Profile Info
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div>
              <label className="field-label">Username</label>
              <input className="field-input" value={form.username} onChange={upd("username")} placeholder="your_username"/>
            </div>
            <div>
              <label className="field-label">Display Name</label>
              <input className="field-input" value={form.name} onChange={upd("name")} placeholder="Your Name"/>
            </div>
            <div>
              <label className="field-label">Bio</label>
              <textarea className="field-input" value={form.bio} onChange={upd("bio")} rows={3} placeholder="📸 Photographer | 🌍 Travel | ✨ Life"/>
            </div>
            <div>
              <label className="field-label">Website</label>
              <input className="field-input" value={form.website} onChange={upd("website")} placeholder="https://yoursite.com"/>
            </div>
          </div>
        </div>

        <button
          className="btn-primary"
          style={{width:"100%",padding:12,fontSize:15,marginTop:4}}
          onClick={()=>onSave(form)}
          disabled={!form.token||!form.chatId}
        >
          Save & Open Portfolio
        </button>
      </div>
    </div>
  );
}

/* ─── Bootstrap ──────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
